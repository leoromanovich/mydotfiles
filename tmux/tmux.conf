# =====================================================================
#  tmux.conf — минимальный конфиг
#  Плагин: только vim-tmux-navigator (через TPM)
# =====================================================================

# --- Терминал и цвета ---
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"

# --- Основные опции (замена tmux-sensible) ---
set -g history-limit 100000
set -g mouse on
set -g escape-time 0
set -g focus-events on
set -g display-time 4000
set -g status-interval 5
set -g status-keys emacs
setw -g aggressive-resize on

# --- Нумерация окон и панелей с 1 ---
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Навигация панелей (prefix + h/j/k/l) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Переключение панелей с Alt + Arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Изменение размеров панелей с Shift + Arrow
bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Up resize-pane -U 5
bind -n S-Down resize-pane -D 5

# Переключение окон
bind -n C-Left previous-window
bind -n C-Right next-window
bind -n M-H previous-window
bind -n M-L next-window

# --- Режим копирования (vi + системный буфер, замена tmux-yank) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Копирование в системный буфер (macOS / Linux)
if-shell "uname | grep -q Darwin" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard 2>/dev/null || wl-copy 2>/dev/null'"

# --- Разделение панелей (сохранение рабочей директории) ---
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# --- Statusbar (замена catppuccin, минимальная тема) ---
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[default] "
set -g status-right "#[fg=#bac2de]%H:%M #[fg=#1e1e2e,bg=#a6e3a1,bold] #h "
set -g status-left-length 30
set -g status-right-length 30
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#cdd6f4,bg=#313244,bold] #I:#W "
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#313244,fg=#cdd6f4"

# --- Плагины (только vim-tmux-navigator) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Инициализация TPM
run '~/.tmux/plugins/tpm/tpm'
